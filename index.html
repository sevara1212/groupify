<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Groupify</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <script>
      (() => {
        const savedTheme = window.localStorage.getItem('groupify-theme');
        const savedColorMode = window.localStorage.getItem('groupify-color-mode');
        const savedContrast = window.localStorage.getItem('groupify-contrast');
        const savedMotion = window.localStorage.getItem('groupify-motion');
        const theme = savedTheme === 'light' || savedTheme === 'dark'
          ? savedTheme
          : window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        const colorMode = savedColorMode === 'accessible' ? 'accessible' : 'default';
        const contrast = savedContrast === 'high'
          ? 'high'
          : savedContrast === 'standard'
            ? 'standard'
            : (window.matchMedia?.('(prefers-contrast: more)')?.matches ?? false) ? 'high' : 'standard';
        const motion = savedMotion === 'reduced'
          ? 'reduced'
          : savedMotion === 'normal'
            ? 'normal'
            : window.matchMedia('(prefers-reduced-motion: reduce)').matches ? 'reduced' : 'normal';

        document.documentElement.dataset.theme = theme;
        document.documentElement.dataset.colorMode = colorMode;
        document.documentElement.dataset.contrast = contrast;
        document.documentElement.dataset.motion = motion;
        document.documentElement.style.colorScheme = theme;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
